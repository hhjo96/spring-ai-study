spring:
  application:
    name: week4-practice-project
  ai:
    chat:
      client:
        enabled: false  # ChatClient 자동 구성 비활성화 (AiConfig에서 수동 생성)
    openai:
      api-key: ${OPENAI_API_KEY:sk-proj-xxxxxxxxxx}
      chat:
        options:
          model: gpt-4.1-nano
      image:
        options:
          model: dall-e-3 # 참고) 2026년 5월 12일에 deprecation 예정, 저렴한 가격이라 테스트용으로 사용

  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 25MB

server:
  port: 8080

logging:
  level:
    org.springframework.ai: DEBUG
    com.study.multimodal: DEBUG
